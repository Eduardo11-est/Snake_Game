<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake Game</title>

<style>
/* ==========================================================
   RESET
========================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0f172a;
    --card:#111827;
    --card-light:#1f2937;
    --snake:#22c55e;
    --snake-head:#4ade80;
    --food:#ef4444;
    --text:#f8fafc;
    --muted:#94a3b8;
    --accent:#3b82f6;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top, #1e293b 0%, #0f172a 55%);
    font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    color:var(--text);
    padding:20px;
}

.game-wrapper{
    width:min(95vw, 700px);
}

.panel{
    background:rgba(17,24,39,.85);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:24px;
    box-shadow:
        0 20px 50px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.05);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    gap:15px;
    flex-wrap:wrap;
}

.title{
    font-size:clamp(1.3rem, 2vw, 1.8rem);
    font-weight:700;
    letter-spacing:.5px;
}

.score-box{
    background:var(--card-light);
    padding:10px 16px;
    border-radius:14px;
    font-weight:700;
    color:white;
}

.score-box span{
    color:#60a5fa;
}

.canvas-container{
    position:relative;
    width:100%;
    aspect-ratio:1 / 1;
}

canvas{
    width:100%;
    height:100%;
    display:block;
    background:
        linear-gradient(
            rgba(255,255,255,.02),
            rgba(255,255,255,.02)
        ),
        #0b1220;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.08);
}

.overlay{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(6px);
    border-radius:18px;
    transition:.3s ease;
    opacity:0;
    pointer-events:none;
}

.overlay.show{
    opacity:1;
    pointer-events:auto;
}

.modal{
    padding:30px;
    max-width:90%;
}

.modal h2{
    font-size:2rem;
    margin-bottom:10px;
}

.modal p{
    color:var(--muted);
    margin-bottom:20px;
    line-height:1.5;
}

button{
    border:none;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),#2563eb);
    color:white;
    font-weight:700;
    padding:12px 22px;
    border-radius:12px;
    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
}

.instructions{
    margin-top:14px;
    color:var(--muted);
    text-align:center;
    font-size:.95rem;
}

kbd{
    background:#1f2937;
    border:1px solid rgba(255,255,255,.08);
    border-bottom-width:3px;
    border-radius:6px;
    padding:2px 7px;
    color:white;
}

.pulse{
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

@media (max-width:600px){
    .panel{
        padding:16px;
    }

    .header{
        justify-content:center;
    }

    .title,
    .score-box{
        width:100%;
        text-align:center;
    }
}
</style>
</head>

<body>

<div class="game-wrapper">
    <div class="panel">

        <div class="header">
            <div class="title">🐍 Snake Game</div>

            <div class="score-box">
                Pontuação: <span id="score">0</span>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="600" height="600"></canvas>

            <div class="overlay show" id="overlay">
                <div class="modal">
                    <h2>Snake Game</h2>
                    <p>
                        Use as teclas de seta para mover a cobrinha.<br>
                        Coma a comida, aumente a pontuação e evite colisões.
                    </p>
                    <button id="startBtn" class="pulse">
                        Iniciar Jogo
                    </button>
                </div>
            </div>
        </div>

        <div class="instructions">
            Controles:
            <kbd>↑</kbd>
            <kbd>↓</kbd>
            <kbd>←</kbd>
            <kbd>→</kbd>
        </div>

    </div>
</div>

<script>
/* ==========================================================
   CONFIGURAÇÕES
========================================================== */

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreElement = document.getElementById("score");
const overlay = document.getElementById("overlay");
const startBtn = document.getElementById("startBtn");

const GRID_SIZE = 20;
const TILE_COUNT = canvas.width / GRID_SIZE;

let snake;
let direction;
let nextDirection;
let food;
let score;
let gameOver;
let gameLoop;

/* ==========================================================
   INICIALIZAÇÃO
========================================================== */

function initGame() {
    snake = [
        { x: 10, y: 10 }
    ];

    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };

    score = 0;
    gameOver = false;

    updateScore();
    generateFood();

    clearInterval(gameLoop);
    gameLoop = setInterval(update, 100);
}

/* ==========================================================
   PONTUAÇÃO
========================================================== */

function updateScore() {
    scoreElement.textContent = score;
}

/* ==========================================================
   COMIDA
========================================================== */

function generateFood() {

    let validPosition = false;

    while (!validPosition) {

        food = {
            x: Math.floor(Math.random() * TILE_COUNT),
            y: Math.floor(Math.random() * TILE_COUNT)
        };

        validPosition = !snake.some(
            segment =>
                segment.x === food.x &&
                segment.y === food.y
        );
    }
}

/* ==========================================================
   LOOP PRINCIPAL
========================================================== */

function update() {

    if (gameOver) return;

    direction = nextDirection;

    const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    /* Colisão com paredes */
    if (
        head.x < 0 ||
        head.x >= TILE_COUNT ||
        head.y < 0 ||
        head.y >= TILE_COUNT
    ) {
        endGame();
        return;
    }

    /* Colisão com o próprio corpo */
    if (
        snake.some(
            segment =>
                segment.x === head.x &&
                segment.y === head.y
        )
    ) {
        endGame();
        return;
    }

    snake.unshift(head);

    /* Comer comida */
    if (
        head.x === food.x &&
        head.y === food.y
    ) {
        score += 10;
        updateScore();
        generateFood();
    } else {
        snake.pop();
    }

    draw();
}

/* ==========================================================
   DESENHO
========================================================== */

function draw() {

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawGrid();
    drawFood();
    drawSnake();
}

function drawGrid() {

    ctx.strokeStyle = "rgba(255,255,255,.04)";
    ctx.lineWidth = 1;

    for (let i = 0; i <= TILE_COUNT; i++) {

        const pos = i * GRID_SIZE;

        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
    }
}

function drawFood() {

    const padding = 3;

    ctx.fillStyle = "#ef4444";

    ctx.beginPath();
    ctx.roundRect(
        food.x * GRID_SIZE + padding,
        food.y * GRID_SIZE + padding,
        GRID_SIZE - padding * 2,
        GRID_SIZE - padding * 2,
        6
    );
    ctx.fill();

    ctx.shadowColor = "#ef4444";
    ctx.shadowBlur = 15;
    ctx.fill();

    ctx.shadowBlur = 0;
}

function drawSnake() {

    snake.forEach((segment, index) => {

        const padding = 2;

        ctx.fillStyle =
            index === 0
                ? "#4ade80"
                : "#22c55e";

        ctx.beginPath();
        ctx.roundRect(
            segment.x * GRID_SIZE + padding,
            segment.y * GRID_SIZE + padding,
            GRID_SIZE - padding * 2,
            GRID_SIZE - padding * 2,
            5
        );
        ctx.fill();
    });
}

/* ==========================================================
   GAME OVER
========================================================== */

function endGame() {

    gameOver = true;
    clearInterval(gameLoop);

    overlay.classList.add("show");

    overlay.innerHTML = `
        <div class="modal">
            <h2>Game Over</h2>
            <p>
                Pontuação final: <strong>${score}</strong>
            </p>
            <button id="restartBtn">
                Jogar Novamente
            </button>
        </div>
    `;

    document
        .getElementById("restartBtn")
        .addEventListener("click", startGame);
}

/* ==========================================================
   CONTROLES
========================================================== */

window.addEventListener("keydown", (event) => {

    switch (event.key) {

        case "ArrowUp":
            if (direction.y !== 1) {
                nextDirection = { x: 0, y: -1 };
            }
            break;

        case "ArrowDown":
            if (direction.y !== -1) {
                nextDirection = { x: 0, y: 1 };
            }
            break;

        case "ArrowLeft":
            if (direction.x !== 1) {
                nextDirection = { x: -1, y: 0 };
            }
            break;

        case "ArrowRight":
            if (direction.x !== -1) {
                nextDirection = { x: 1, y: 0 };
            }
            break;
    }
});

/* ==========================================================
   START / RESTART
========================================================== */

function startGame() {

    overlay.classList.remove("show");

    overlay.innerHTML = `
        <div class="modal">
            <h2>Snake Game</h2>
        </div>
    `;

    initGame();
    draw();
}

startBtn.addEventListener("click", startGame);

/* ==========================================================
   PRIMEIRO RENDER
========================================================== */

drawGrid();
</script>

</body>
</html>
